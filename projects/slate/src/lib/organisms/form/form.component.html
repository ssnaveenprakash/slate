<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="slt-form" [class.slt-form--two-column]="schema.layout === 'two-column'">

  <storybook-alert
    *ngIf="submitSuccess && schema.successMessage"
    type="success"
    [message]="schema.successMessage"
    [dismissible]="true"
    (onClose)="submitSuccess = false"
    class="slt-form__alert"
  ></storybook-alert>

  <div class="slt-form__fields">
    <ng-container *ngFor="let field of schema.fields">

      <div *ngIf="isTextType(field.type)" class="slt-form__field" [ngClass]="colSpanClass(field)">
        <slt-form-field
          [label]="field.label"
          [type]="inputType(field)"
          [placeholder]="field.placeholder || ''"
          [helperText]="field.helperText || ''"
          [required]="!!field.validators?.required"
          [disabled]="!!field.disabled"
          [validationMessage]="getError(field.key)"
          [value]="getControl(field.key).value ?? ''"
          (valueChange)="getControl(field.key).setValue($event)"
          (blur)="onFieldBlur(field.key)"
        ></slt-form-field>
      </div>

      <div *ngIf="field.type === 'dropdown'" class="slt-form__field" [ngClass]="colSpanClass(field)">
        <div class="slt-form__label-row">
          <label class="slt-form__field-label">
            {{ field.label }}
            <span *ngIf="field.validators?.required" class="slt-form__required" aria-hidden="true">*</span>
          </label>
        </div>
        <slt-dropdown
          [options]="field.options || []"
          [placeholder]="field.placeholder || 'Select'"
          [disabled]="!!field.disabled"
          [value]="getControl(field.key).value"
          (valueChange)="onDropdownChange(field.key, $event)"
        ></slt-dropdown>
        <p *ngIf="field.helperText && !getError(field.key)" class="slt-form__helper">{{ field.helperText }}</p>
        <p *ngIf="getError(field.key)" class="slt-form__error" role="alert">
          <svg class="slt-form__error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          {{ getError(field.key) }}
        </p>
      </div>

      <div *ngIf="field.type === 'checkbox'" class="slt-form__field slt-form__field--inline" [ngClass]="colSpanClass(field)">
        <lib-checkbox
          [label]="field.label"
          [checked]="!!getControl(field.key).value"
          [disabled]="!!field.disabled"
          (onChange)="onCheckboxChange(field.key, $event)"
        ></lib-checkbox>
        <p *ngIf="field.helperText && !getError(field.key)" class="slt-form__helper">{{ field.helperText }}</p>
        <p *ngIf="getError(field.key)" class="slt-form__error" role="alert">
          <svg class="slt-form__error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          {{ getError(field.key) }}
        </p>
      </div>

      <div *ngIf="field.type === 'radio'" class="slt-form__field" [ngClass]="colSpanClass(field)">
        <label class="slt-form__field-label">
          {{ field.label }}
          <span *ngIf="field.validators?.required" class="slt-form__required" aria-hidden="true">*</span>
        </label>
        <div class="slt-form__radio-group">
          <lib-radio
            *ngFor="let opt of field.options"
            [label]="opt.label"
            [name]="field.key"
            [checked]="getControl(field.key).value === opt.value"
            [disabled]="!!field.disabled || !!opt.disabled"
            (onClick)="onRadioChange(field.key, opt.value, $event)"
          ></lib-radio>
        </div>
        <p *ngIf="field.helperText && !getError(field.key)" class="slt-form__helper">{{ field.helperText }}</p>
        <p *ngIf="getError(field.key)" class="slt-form__error" role="alert">
          <svg class="slt-form__error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          {{ getError(field.key) }}
        </p>
      </div>

      <div *ngIf="field.type === 'toggle'" class="slt-form__field slt-form__field--inline" [ngClass]="colSpanClass(field)">
        <lib-toggle
          [label]="field.label"
          [checked]="!!getControl(field.key).value"
          [disabled]="!!field.disabled"
          (onChange)="onToggleChange(field.key, $event)"
        ></lib-toggle>
        <p *ngIf="field.helperText" class="slt-form__helper">{{ field.helperText }}</p>
      </div>

    </ng-container>
  </div>

  <div class="slt-form__actions">
    <storybook-button
      *ngIf="schema.cancelLabel"
      variant="secondary"
      [label]="schema.cancelLabel"
      (onClick)="onCancel()"
    ></storybook-button>

    <storybook-button
      type="submit"
      variant="primary"
      [label]="schema.submitLabel || 'Submit'"
      [loading]="loading"
      (onClick)="onSubmit()"
    ></storybook-button>
  </div>

</form>
