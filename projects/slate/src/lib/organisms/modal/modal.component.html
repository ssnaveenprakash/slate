<div
  *ngIf="isOpen"
  class="storybook-modal-backdrop"
  (click)="onBackdropClick($event)"
  role="presentation"
>
  <div
    class="storybook-modal"
    [ngClass]="classes"
    role="dialog"
    [attr.aria-modal]="true"
    [attr.aria-labelledby]="titleId"
    (click)="$event.stopPropagation()"
  >
    <!-- Modal Header -->
    <header class="storybook-modal__header">
      <h2 [id]="titleId" class="storybook-modal__title">{{ title }}</h2>
      <button
        *ngIf="showCloseButton"
        type="button"
        class="storybook-modal__close"
        aria-label="Close modal"
        (click)="closeModal()"
      >
        <svg
          class="storybook-modal__close-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Modal Body -->
    <div class="storybook-modal__body">
      <ng-content></ng-content>
    </div>

    <!-- Modal Footer -->
    <footer class="storybook-modal__footer">
      <ng-content select="[modalFooter]"></ng-content>
    </footer>
  </div>
</div>
